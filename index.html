<!DOCTYPE html>
<html class="flat">
  <head>
    <title>Search</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
  </head>
  <body>
    <div class="deck" title="deck">
      <div class="staticCard" style="--i: 16; --t: 0; --stack: -1px"></div>
      <div class="staticCard" style="--i: 16; --t: 0; --stack: -2px"></div>
      <div class="staticCard" style="--i: 16; --t: 0; --stack: -3px"></div>
      <div class="staticCard" style="--i: 16; --t: 0; --stack: -4px"></div>
      <div class="staticCard" style="--i: 16; --t: 0; --stack: -5px"></div>
      <div class="staticCard" style="--i: 16; --t: 0; --stack: -6px"></div>
      <div class="staticCard" style="--i: 16; --t: 0; --stack: -7px"></div>
    </div>
    <div class="cards" id="cards">
      <div class="newcard" id="add">
        <span class="material-symbols-rounded">add</span>
      </div>
    </div>
    <div class="total">0 Points</div>
    <script src="script.js"></script>
  </body>
</html>
